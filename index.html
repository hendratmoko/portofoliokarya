  <script src="/_sdk/6740099151a06780.editing_sdk.js" integrity="sha512-eSc5OWFJjK6fUpxViOKXm5ekJ3Gp5icgygsjPVz9Xzudb9TkX/uNdpqNHc63uN0PdxYE9+g8pZAHIib0FgE0Cw=="></script>
  <script>
    lucide.createIcons();

    let isDark = true;
    let allData = [];
    let currentUser = null;
    let currentFilter = 'all';

    const catNames = {
      nkpi:'NKPI',tkpi:'TKPI',tphp:'TPHP',apat:'APAT',
      rpl:'RPL',tkr:'TKR',tpbo:'TPBO',
      matematika:'Matematika',informatika:'Informatika',
      kewirausahaan:'Kewirausahaan',seni_budaya:'Seni Budaya'
    };
    const catColors = {
      nkpi:'#0284c7',tkpi:'#0369a1',tphp:'#0891b2',apat:'#059669',
      rpl:'#16a34a',tkr:'#d97706',tpbo:'#dc2626',
      matematika:'#7c3aed',informatika:'#2563eb',
      kewirausahaan:'#ca8a04',seni_budaya:'#c026d3'
    };

    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('light-mode', !isDark);
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function showAuthSection() {
      document.getElementById('auth-section').classList.remove('hidden');
      document.getElementById('submit-section').classList.add('hidden');
    }

    function showSubmitSection() {
      document.getElementById('auth-section').classList.add('hidden');
      document.getElementById('submit-section').classList.remove('hidden');
    }

    function generateCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value.trim();
      const dept = document.getElementById('reg-dept').value.trim();
      const contact = document.getElementById('reg-contact').value.trim();
      if (!name || !dept) return;
      if (allData.length >= 999) { showToast('Batas data tercapai (999)','error'); return; }
      const code = generateCode();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = '...';
      const result = await window.dataSdk.create({
        name, status:'registered', department:dept, contact,
        access_code:code, work_title:'', work_description:'',
        work_category:'', work_link:'', work_visible:false,
        stars:0, certified:false, quiz_score:0,
        created_at: new Date().toISOString()
      });
      btn.disabled = false; btn.textContent = 'Daftar';
      if (result.isOk) {
        const res = document.getElementById('reg-result');
        res.classList.remove('hidden');
        res.textContent = 'Kode akses: ' + code;
        res.style.color = 'var(--accent)';
        e.target.reset();
        showToast('Pendaftaran berhasil!','success');
      } else { showToast('Gagal mendaftar','error'); }
    }

    function handleLogin(e) {
      e.preventDefault();
      const code = document.getElementById('login-code').value.trim();
      const found = allData.find(d => d.access_code === code);
      if (found) {
        currentUser = found;
        showSubmitSection();
        showToast('Selamat datang, ' + found.name,'success');
      } else { showToast('Kode akses tidak ditemukan','error'); }
    }

    function logout() {
      currentUser = null;
      showAuthSection();
      showToast('Anda telah keluar','success');
    }

    async function handleSubmitWork(e) {
      e.preventDefault();
      if (!currentUser) return;
      const title = document.getElementById('work-title').value.trim();
      const desc = document.getElementById('work-desc').value.trim();
      const cat = document.getElementById('work-cat').value;
      const link = document.getElementById('work-link').value.trim();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = '...';
      const updated = {...currentUser, work_title:title, work_description:desc, work_category:cat, work_link:link, work_visible:true};
      const result = await window.dataSdk.update(updated);
      btn.disabled = false; btn.textContent = 'Kirim Karya';
      if (result.isOk) { showToast('Karya berhasil dikirim!','success'); e.target.reset(); }
      else { showToast('Gagal mengirim','error'); }
    }

    async function rateStar(record, stars) { await window.dataSdk.update({...record, stars}); }

    function renderDynamic(data) {
      const container = document.getElementById('dynamic-gallery');
      const visible = data.filter(d => d.work_visible && d.work_title);
      document.getElementById('empty-dynamic').classList.toggle('hidden', visible.length > 0);
      const existing = new Map([...container.children].map(el => [el.dataset.rid, el]));
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = visible.filter(d => {
        if (currentFilter !== 'all' && d.work_category !== currentFilter) return false;
        if (q && !d.work_title.toLowerCase().includes(q) && !d.name.toLowerCase().includes(q)) return false;
        return true;
      });
      filtered.forEach(item => {
        let el = existing.get(item.__backendId);
        if (!el) {
          const tpl = document.getElementById('work-card-template');
          el = tpl.content.cloneNode(true).firstElementChild;
          el.dataset.rid = item.__backendId;
          container.appendChild(el);
        }
        el.dataset.category = item.work_category;
        el.querySelector('.work-desc').textContent = item.work_description || '';
        el.querySelector('.work-student').textContent = item.name + ' — ' + item.department;
        el.querySelector('[data-template-id="work-card-title"]').textContent = item.work_title;
        const tag = el.querySelector('[data-template-id="work-card-tag"]');
        tag.textContent = catNames[item.work_category] || item.work_category;
        tag.style.background = catColors[item.work_category] || '#666';
        tag.style.color = '#fff';
        const linkEl = el.querySelector('.work-link');
        if (item.work_link) { linkEl.href = item.work_link; linkEl.classList.remove('hidden'); }
        else { linkEl.classList.add('hidden'); }
        const starRow = el.querySelector('.star-row');
        starRow.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
          const s = document.createElement('span');
          s.className = 'star ' + (i <= (item.stars||0) ? 'filled' : 'empty');
          s.textContent = '★';
          s.onclick = () => rateStar(item, i);
          starRow.appendChild(s);
        }
        existing.delete(item.__backendId);
      });
      existing.forEach(el => el.remove());
    }

    function filterCards(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
      if (btn) btn.classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search-input').value.toLowerCase();
      document.querySelectorAll('#static-gallery article').forEach(card => {
        const catMatch = currentFilter === 'all' || card.dataset.category === currentFilter;
        const title = card.querySelector('h3')?.textContent?.toLowerCase() || '';
        const student = card.querySelector('p')?.textContent?.toLowerCase() || '';
        const searchMatch = !q || title.includes(q) || student.includes(q);
        card.style.display = catMatch && searchMatch ? '' : 'none';
      });
      renderDynamic(allData);
    }

    const handler = {
      onDataChanged(data) {
        allData = data;
        if (currentUser) {
          const updated = data.find(d => d.__backendId === currentUser.__backendId);
          if (updated) currentUser = updated;
        }
        renderDynamic(data);
      }
    };

    (async () => {
      showAuthSection();
      const res = await window.dataSdk.init(handler);
      if (!res.isOk) showToast('Gagal memuat data','error');
