<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Backend - Input Karya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; padding:2rem; background:#f7fafc; }
    .star { color: gold; }
    .card { max-width:1000px; margin:0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Halaman Backend - Input Data Karya</h3>
    <p class="text-muted">Masuk menggunakan KODE AKSES yang diberikan.</p>

    <div id="loginBox" class="card p-4 mb-4">
      <div class="mb-3">
        <label class="form-label">Kode Akses</label>
        <input id="accessCode" class="form-control" placeholder="Masukkan kode akses">
      </div>
      <button id="btnLogin" class="btn btn-primary">Masuk</button>
      <div id="loginMsg" class="mt-3 text-danger"></div>
    </div>

    <div id="formBox" class="d-none card p-4">
      <h5>Input Karya Baru</h5>

      <div class="mb-3">
        <label class="form-label">Judul Karya</label>
        <input id="title" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Deskripsi Singkat (alat, bahan, software, lama produksi, pengajar, dll)</label>
        <textarea id="description" class="form-control" rows="4"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Kategori</label>
        <input id="category" class="form-control" placeholder="mis. Siswa / Guru / Mapel">
      </div>

      <div class="mb-3">
        <label class="form-label">Link (YouTube atau Google Drive)</label>
        <input id="link" class="form-control" placeholder="https://...">
      </div>

      <div class="mb-3 row align-items-end">
        <div class="col-auto">
          <label class="form-check-label d-block">Tampilkan di Galeri?</label>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="visibleToggle" checked>
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Tahun</label>
          <input id="year" class="form-control" placeholder="2026">
        </div>
        <div class="col-md-4">
          <label class="form-label">Mata Pelajaran</label>
          <input id="subject" class="form-control" placeholder="...">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Nomor WA (opsional, untuk kirim sertifikat)</label>
        <input id="whatsappNumber" class="form-control" placeholder="62812xxxx (tanpa +)">
      </div>

      <div class="mb-3">
        <label class="form-label">Author / Nama Pembuat</label>
        <input id="author" class="form-control" placeholder="Nama guru / siswa">
      </div>

      <div class="mb-3">
        <label class="form-label">Pilihan: Buat sertifikat sekarang?</label>
        <select id="createCertificate" class="form-select">
          <option value="no">Tidak</option>
          <option value="yes">Ya - buat & kirim sertifikat (jika memenuhi syarat)</option>
        </select>
      </div>

      <button id="btnSubmit" class="btn btn-success">Kirim ke Google Sheets</button>
      <button id="btnReset" class="btn btn-outline-secondary ms-2">Reset Form</button>

      <div id="formMsg" class="mt-3"></div>

      <hr>
      <h6>Preview Lencana / Stars (dihitung dari skor quiz)</h6>
      <div>Jumlah bintang: <span id="previewStars">0</span> <small class="text-muted">(set oleh sistem quiz)</small></div>
    </div>

  </div>

  <script src="../admin/admin.js"></script>
</body>
</html>
